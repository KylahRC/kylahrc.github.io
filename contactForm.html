<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="min-width=1024px">
    <meta name="keywords" content="braids, hair, hairstyles, Nicole braids, Nicole,">
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/sytles.css">

    <script>
        function validateInputPresent() 
        {
            var fullName = document.getElementById('fullNameInput').value;
            var email = document.getElementById('emailInput').value;
            var phoneNumber = document.getElementById('phoneNumberInput').value;
            var message = document.getElementById('messageInput').value;

            if (fullName == "")
                document.getElementById('fullNameInput').style.backgroundColor = 'lemonchiffon';
            else if (fullName != "")
                document.getElementById('fullNameInput').style.backgroundColor = 'white';

            if (email == "")
                document.getElementById('emailInput').style.backgroundColor = 'lemonchiffon';
            else if (email != "")
                document.getElementById('emailInput').style.backgroundColor = 'white';

            if (phoneNumber == "")
                document.getElementById('phoneNumberInput').style.backgroundColor = 'lemonchiffon';
            else if (phoneNumber != "")
                document.getElementById('phoneNumberInput').style.backgroundColor = 'white';

            if
                (message == "")
                document.getElementById('messageInput').style.backgroundColor = 'lemonchiffon';
            else if (message != "")
                document.getElementById('messageInput').style.backgroundColor = 'white';
        }
    </script>
</head>

<body>
    <div class="logo">
        <a href="homePage.html">
            <img src="images/NoBGLogo.png" alt="Your Image" width=20%>

    <center>
        <div style="width: 300px;contain: content;">
            <h1>Contact Us</h1>
            <table>
                <tr>
                    <td>
                        <lable>Full Name</lable>
                    </td>
                    <td>
                        <input type="text" id="fullNameInput">
                    </td>
                <tr>
                    <td>
                        <lable>Email</lable>
                    </td>
                    <td>
                        <input type="email" id="emailInput">
                    </td>
                </tr>
                <tr>
                    <td>
                        <lable>Phone Number</lable>
                    </td>
                    <td>
                        <input type="number" id="phoneNumberInput">
                    </td>
                </tr>
                <tr>
                    <td>
                        <lable>Message</lable>
                    </td>
                    <td>
                        <input type="text" id="messageInput">
                    </td>
                </tr>
                <tr>
                </tr>
                <tr>
                    <td colspan="2">
                        <center><button onclick="validateInputPresent()">SUBMIT</button></center>
                    </td>
                </tr>
            </table>
        </div>
    </center>
